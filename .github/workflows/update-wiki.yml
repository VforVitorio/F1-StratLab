name: Sync DeepWiki to GitHub Wiki (Pandoc)

# Replace fragile JS+regex scraping with robust curl+Pandoc pipeline
# Old approach: Puppeteer overhead, manual SVG extraction, regex brittleness
# New approach: Native HTML parsing, automatic media extraction, community-maintained

on:
  workflow_dispatch: # Manual trigger
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours

jobs:
  sync-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl pandoc
          pandoc --version

      - name: Define DeepWiki slugs
        id: slugs
        run: |
          # Define target pages - could be fetched from sitemap.json if available
          echo 'SLUGS<<EOF' >> $GITHUB_OUTPUT
          echo 'VforVitorio/F1_Strat_Manager' >> $GITHUB_OUTPUT
          echo 'VforVitorio/F1_Strat_Manager/system-architecture' >> $GITHUB_OUTPUT
          echo 'VforVitorio/F1_Strat_Manager/dashboard-components' >> $GITHUB_OUTPUT
          echo 'VforVitorio/F1_Strat_Manager/ml-models' >> $GITHUB_OUTPUT
          echo 'VforVitorio/F1_Strat_Manager/nlp-pipeline' >> $GITHUB_OUTPUT
          echo 'VforVitorio/F1_Strat_Manager/expert-system' >> $GITHUB_OUTPUT
          echo 'VforVitorio/F1_Strat_Manager/developer-guide' >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Fetch HTML and convert to GFM
        run: |
          mkdir -p docs
          # Process each slug: curl raw HTML -> Pandoc GFM conversion
          # Pandoc automatically extracts SVG diagrams, preserves positioning, handles tables/lists
          while IFS= read -r slug; do
            [[ -z "$slug" ]] && continue
            echo "📄 Processing: $slug"
            
            # Fetch raw HTML (may contain dynamic SVGs, complex structures)
            curl -L -f "https://deepwiki.com/$slug" \
              -H "User-Agent: Mozilla/5.0 (compatible; WikiBot/1.0)" \
              -o "page.html" || { echo "❌ Failed to fetch $slug"; continue; }
            
            # Convert to GitHub-Flavored Markdown with automatic media extraction
            # --extract-media: SVGs/images -> docs/{slug}/media/ folders automatically
            # --to=gfm: Perfect GitHub Wiki compatibility (vs manual regex replacements)
            # --wrap=none: Preserve line structure, no artificial wrapping
            pandoc page.html \
              --from=html \
              --to=gfm \
              --extract-media="docs/$(basename "$slug")" \
              --standalone \
              --wrap=none \
              --output="docs/$(basename "$slug").md" || {
                echo "⚠️ Pandoc conversion failed for $slug, creating fallback"
                echo "# $(basename "$slug")" > "docs/$(basename "$slug").md"
                echo "Content extraction failed. See [DeepWiki](https://deepwiki.com/$slug)." >> "docs/$(basename "$slug").md"
              }
            
            rm -f page.html
            echo "✅ Converted: $(basename "$slug").md"
          done <<< "${{ steps.slugs.outputs.SLUGS }}"

      - name: Checkout Wiki repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          token: ${{ secrets.GITHUB_TOKEN }}
          path: wiki

      - name: Sync documentation to Wiki
        working-directory: wiki
        run: |
          # Replace fragile file-by-file copying with complete sync
          # Preserves media directories, maintains exact DeepWiki structure
          rm -rf *.md */
          cp -r ../docs/* . 2>/dev/null || echo "No files to copy"

          # Create Home.md navigation if main content exists
          if [[ -f "F1_Strat_Manager.md" ]]; then
            mv "F1_Strat_Manager.md" "Home.md"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          if ! git diff --quiet --cached; then
            git commit -m "📖 Sync from DeepWiki via Pandoc ($(date '+%Y-%m-%d %H:%M'))"
            git push
            echo "✅ Wiki updated successfully"
          else
            echo "ℹ️ No changes detected"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wiki-docs-${{ github.run_number }}
          path: docs/
          retention-days: 7
