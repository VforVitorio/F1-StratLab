name: Update Wiki from DeepWiki (Official MCP + Clean Processing)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js and Python
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Setup Chrome for Puppeteer
        uses: browser-actions/setup-chrome@latest

      - name: Install Dependencies
        run: |
          echo "📦 Installing MCP client and tools..."
          npm init -y
          npm install @modelcontextprotocol/sdk puppeteer
          pip install requests beautifulsoup4 markdownify

      - name: Extract Content via DeepWiki MCP
        run: |
          mkdir -p docs-md diagrams wiki

          cat > extract-mcp.js << 'EOF'
          const { Client } = require('@modelcontextprotocol/sdk/client/index.js');
          const fs = require('fs');

          async function main() {
            try {
              const client = new Client({
                name: "wiki-extractor",
                version: "1.0.0"
              });

              const { SSEClientTransport } = require('@modelcontextprotocol/sdk/client/sse.js');
              const transport = new SSEClientTransport(new URL('https://mcp.deepwiki.com/sse'));



              // WORKAROUND: Restore URL after connection (SDK bug fix)
              transport.url = new URL('https://mcp.deepwiki.com/sse');
              console.log('Fixed transport URL bug - forced URL restoration');
              const repo = 'VforVitorio/F1_Strat_Manager';
              // Debug: List available tools
              const tools = await client.listTools();
              console.log('Available tools:', tools.tools.map(t => t.name));

              // Use existing MCP connection correctly
              console.log('Using MCP connection for extraction...');
              
              try {
                // Deep debugging of SSE transport
                console.log('Attempting read_wiki_structure with deep debugging...');
                
                try {
                  // Log transport state before call
                  console.log('Transport URL:', transport.url);
                  console.log('Transport state:', {
                    url: transport.url,
                    connected: !!transport._eventSource,
                    readyState: transport._eventSource?.readyState
                  });
                  
                  // Make the call with minimal error handling to see raw error
                  console.log('Making callTool request...');
                  const structureResult = await client.callTool('read_wiki_structure', {
                    repoName: 'VforVitorio/F1_Strat_Manager'
                  });
                  
                  console.log('SUCCESS! Structure extracted');
                  
                } catch (error) {
                  console.log('=== DEEP ERROR ANALYSIS ===');
                  console.log('Error type:', error.constructor.name);
                  console.log('Error message:', error.message);
                  console.log('Error properties:', Object.keys(error));
                  console.log('Transport _eventSource state:', transport._eventSource?.readyState);
                  console.log('Transport URL after error:', transport.url);
                  
                  // Try to get more details from the error
                  if (error.response) {
                    console.log('Response status:', error.response.status);
                    console.log('Response headers:', error.response.headers);
                  }
                  
                  console.log('Full error object:', JSON.stringify(error, Object.getOwnPropertyNames(error), 2));
                  console.log('============================');
                  
                  throw error;
                }
                
                console.log('SUCCESS! Structure extracted');
                const structure = JSON.parse(structureResult.content[0].text);
                console.log('Found', structure.pages.length, 'pages');
                
                const allContent = {};
                
                // Extract each page
                for (const page of structure.pages) {
                  console.log('Extracting:', page.title);
                  
                  try {
                    const contentResult = await client.callTool('read_wiki_contents', {
                      repoName: 'VforVitorio/F1_Strat_Manager',
                      page: page.title
                    });
                    
                    const cleanName = page.title.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase();
                    
                    allContent[cleanName] = {
                      title: page.title,
                      content: contentResult.content[0].text,
                      order: page.order || 999
                    };
                    
                    console.log('Extracted:', cleanName);
                  } catch (error) {
                    console.log('Failed to extract:', page.title, error.message);
                  }
                }
                
                // Save all content
                for (const [name, data] of Object.entries(allContent)) {
                  fs.writeFileSync(`docs-md/${name}.md`, `# ${data.title}\n\n${data.content}`);
                }
                
                console.log('Real MCP extraction completed with', Object.keys(allContent).length, 'pages');
                
              } catch (error) {
                console.log('MCP structure extraction failed:', error.message);
                throw error; // Stop execution if we can't get real content
              }


              await client.disconnect();
              console.log('MCP extraction completed');

            } catch (error) {
              console.error('MCP extraction failed:', error.message);
              fs.writeFileSync('docs-md/main.md', 'F1 Strategy Manager\n\nExtraction failed: ' + error.message);
              process.exit(1);
            }
          }

          main();
          EOF

          node extract-mcp.js

      - name: Capture Diagrams with Puppeteer
        run: |
          cat > capture-diagrams.js << 'EOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');

          async function captureDiagrams() {
            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });

            try {
              const page = await browser.newPage();
              await page.setViewport({ width: 1280, height: 720 });
              
              await page.goto('https://deepwiki.com/VforVitorio/F1_Strat_Manager', { 
                waitUntil: 'networkidle2' 
              });

              // Wait for content to load
              await page.waitForTimeout(5000);

              // Find and capture diagrams
              const diagrams = await page.$$eval('svg, .mermaid, [data-diagram]', elements => {
                return elements.map((el, index) => ({
                  index: index,
                  bounds: el.getBoundingClientRect(),
                  type: el.tagName.toLowerCase()
                }));
              });

              console.log('Found', diagrams.length, 'diagrams');

              if (!fs.existsSync('diagrams')) {
                fs.mkdirSync('diagrams');
              }

              for (let i = 0; i < diagrams.length; i++) {
                try {
                  const elements = await page.$$('svg, .mermaid, [data-diagram]');
                  if (elements[i]) {
                    await elements[i].screenshot({
                      path: `diagrams/diagram-${i + 1}.png`,
                      type: 'png'
                    });
                    console.log(`Captured diagram-${i + 1}.png`);
                  }
                } catch (error) {
                  console.log(`Failed to capture diagram ${i + 1}:`, error.message);
                }
              }

              // Create diagram index
              fs.writeFileSync('diagrams/index.json', JSON.stringify({
                captured: diagrams.length,
                files: fs.readdirSync('diagrams').filter(f => f.endsWith('.png'))
              }, null, 2));

            } catch (error) {
              console.error('Diagram capture failed:', error.message);
            } finally {
              await browser.close();
            }
          }

          captureDiagrams();
          EOF

          node capture-diagrams.js

      - name: Clean and Process Content
        run: |
          python3 << 'EOF'
          import re
          import json
          import os
          from pathlib import Path

          def clean_content(content):
              # Remove DeepWiki UI elements
              patterns = [
                  r'.*?DeepWiki.*?\n',
                  r'Last indexed:.*?\n',
                  r'Try DeepWiki.*?\n',
                  r'Powered by.*?\n',
                  r'Sources?:.*?\n',
                  r'\| VforVitorio/F1_Strat_Manager.*?\n'
              ]
              
              for pattern in patterns:
                  content = re.sub(pattern, '', content, flags=re.IGNORECASE)
              
              # Fix malformed headings: "## 1 1 Title" -> "## Title"
              content = re.sub(r'^(#{1,6})\s*(?:\d+\s*)+(.+?)$', r'\1 \2', content, flags=re.MULTILINE)
              
              # Remove empty headings
              content = re.sub(r'^#{1,6}\s*$', '', content, flags=re.MULTILINE)
              
              # Replace diagram text with image references
              diagram_patterns = [
                  (r'Strategic Output.*?StrategyRecommendation', '![System Architecture](../diagrams/diagram-1.png)'),
                  (r'F1StrategyManager.*?NLPProcessor', '![Component Diagram](../diagrams/diagram-2.png)'),
                  (r'fact_base.*?strategy_output', '![Expert System Flow](../diagrams/diagram-3.png)'),
                  (r'```mermaid.*?```', '![Mermaid Diagram](../diagrams/diagram-4.png)'),
                  (r'<svg.*?</svg>', '![SVG Diagram](../diagrams/diagram-5.png)'),
                  (r'\[diagram\].*?\[/diagram\]', '![Custom Diagram](../diagrams/diagram-6.png)'),
                  (r'flowchart.*?\n\n', '![Flowchart](../diagrams/diagram-7.png)'),
                  (r'graph.*?\n\n', '![Graph Diagram](../diagrams/diagram-8.png)')
              ]
              
              for pattern, replacement in diagram_patterns:
                  content = re.sub(pattern, replacement, content, flags=re.DOTALL | re.IGNORECASE)
              
              # Clean up whitespace
              content = re.sub(r'\n{3,}', '\n\n', content)
              return content.strip()

          def preserve_internal_links(content):
              # Convierte enlaces internos de DeepWiki a formato GitHub Wiki
              content = re.sub(r'\[\[([^\]]+)\]\]', r'[\1](\1)', content)
              content = re.sub(r'\[([^\]]+)\]\(#([^)]+)\)', r'[\1](#\2)', content)
              content = re.sub(r'href="([^"]*)/VforVitorio/F1_Strat_Manager/([^"]*)"', r'href="\2"', content)
              return content

          def organize_pages(all_content):
              # Análisis basado en títulos H1/H2 del contenido
              organized = {
                  'Home': [], 'Overview': [], 'Installation': [], 'Dashboard': [], 
                  'ML-Models': [], 'NLP-Pipeline': [], 'Expert-System': [], 'Developer-Guide': []
              }
              
              for page_name, content in all_content.items():
                  content_lower = content.lower()
                  
                  # Extraer títulos H1/H2 para categorización
                  h1_titles = ' '.join(re.findall(r'^# (.+)$', content, re.MULTILINE)).lower()
                  h2_titles = ' '.join(re.findall(r'^## (.+)$', content, re.MULTILINE)).lower()
                  all_titles = h1_titles + ' ' + h2_titles + ' ' + page_name.lower()
                  
                  # Categorización por análisis de títulos
                  if any(word in all_titles for word in ['install', 'setup', 'getting started', 'requirements']):
                      organized['Installation'].append((page_name, content))
                  elif any(word in all_titles for word in ['dashboard', 'streamlit', 'interface', 'ui']):
                      organized['Dashboard'].append((page_name, content))
                  elif any(word in all_titles for word in ['machine learning', 'model', 'prediction', 'training']):
                      organized['ML-Models'].append((page_name, content))
                  elif any(word in all_titles for word in ['nlp', 'natural language', 'transcription', 'radio']):
                      organized['NLP-Pipeline'].append((page_name, content))
                  elif any(word in all_titles for word in ['expert system', 'rules', 'facts', 'inference']):
                      organized['Expert-System'].append((page_name, content))
                  elif any(word in all_titles for word in ['developer', 'development', 'api', 'testing']):
                      organized['Developer-Guide'].append((page_name, content))
                  else:
                      organized['Overview'].append((page_name, content))
              
              # Home usa primer elemento de Overview si existe
              if organized['Overview']:
                  organized['Home'] = [organized['Overview'][0]]
                  organized['Overview'] = organized['Overview'][1:]
              
              return organized

          # Load extracted content
          all_content = {}
          for md_file in Path('docs-md').glob('*.md'):
              if md_file.name != 'metadata.json':
                  with open(md_file, 'r', encoding='utf-8') as f:
                      content = f.read()
                  
                  # Extract title and content
                  lines = content.split('\n')
                  if lines[0].startswith('# '):
                      title = lines[0][2:].strip()
                      content = '\n'.join(lines[1:]).strip()
                  else:
                      title = md_file.stem.replace('-', ' ').title()
                  
                  cleaned = clean_content(content)
                  all_content[md_file.stem] = preserve_internal_links(cleaned)

          print(f"Loaded {len(all_content)} content files")

          # Organize content into wiki structure
          organized = organize_pages(all_content)

          # Save organized content for wiki generation
          with open('docs-md/organized.json', 'w', encoding='utf-8') as f:
              json.dump(organized, f, indent=2)

          print("Content cleaning and organization completed")
          EOF

      - name: Checkout Wiki Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          token: ${{ secrets.WIKI_PAT }}
          path: wiki

      - name: Generate Wiki Pages
        run: |
          python3 << 'EOF'
          import json
          import os
          from datetime import datetime

          # Load organized content
          with open('docs-md/organized.json', 'r', encoding='utf-8') as f:
              organized = json.load(f)

          def create_page(title, description, content_list):
              page = f"# {title}\n\n{description}\n\n"
              
              for name, content in content_list:
                  if content.strip():
                      # Add section header
                      section_title = name.replace('-', ' ').replace('_', ' ').title()
                      page += f"## {section_title}\n\n{content}\n\n---\n\n"
              
              page += f"\n*Last updated: {datetime.now().strftime('%Y-%m-%d %H:%M UTC')}*\n"
              return page

          # Create Home page
          if organized['Home']:
              home_content = create_page(
                  "🏎️ F1 Strategy Manager",
                  "AI-Powered Formula 1 Race Strategy Analysis and Decision Support System",
                  organized['Home']
              )
              
              # Add navigation
              nav = "\n## 📚 Documentation Pages\n\n"
              for page_name in ['Overview', 'Installation', 'Dashboard', 'ML-Models', 'NLP-Pipeline', 'Expert-System', 'Developer-Guide']:
                  if organized[page_name]:
                      nav += f"- **[{page_name.replace('-', ' ')}]({page_name})**\n"
              
              home_content = home_content.replace("*Last updated:", nav + "\n---\n\n*Last updated:")
              
              with open('wiki/Home.md', 'w', encoding='utf-8') as f:
                  f.write(home_content)

          # Create other pages
          pages_info = {
              'Overview': ('🔍 Overview & Architecture', 'Project overview, system architecture, and installation'),
              'Installation': ('⚙️ Installation & Setup', 'Getting started, requirements, and configuration'),
              'Dashboard': ('📊 Streamlit Dashboard', 'Interactive web interface for F1 strategy analysis'),
              'ML-Models': ('🤖 Machine Learning Models', 'AI models for predictions and analysis'),
              'NLP-Pipeline': ('🗣️ NLP Pipeline', 'Radio transcription and sentiment analysis'),
              'Expert-System': ('🧠 Expert System', 'Rule-based decision engine'),
              'Developer-Guide': ('👨‍💻 Developer Guide', 'Development, testing, and deployment')
          }

          for page_name, (title, description) in pages_info.items():
              if organized[page_name]:
                  content = create_page(title, description, organized[page_name])
                  with open(f'wiki/{page_name}.md', 'w', encoding='utf-8') as f:
                      f.write(content)
                  print(f"Created {page_name}.md")

          print("Wiki generation completed")
          EOF

      - name: Copy Diagrams to Wiki
        run: |
          if [ -d "diagrams" ] && [ "$(ls -A diagrams/*.png 2>/dev/null)" ]; then
            mkdir -p wiki/diagrams
            cp diagrams/*.png wiki/diagrams/ 2>/dev/null || true
            echo "Copied diagram files to wiki"
          fi

      - name: Commit and Push Wiki Changes
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          if git diff --quiet --staged; then
            echo "No changes to commit"
          else
            git commit -m "🔄 Update Wiki from DeepWiki MCP - $(date '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ Wiki updated successfully!"
            echo "🌐 Visit: https://github.com/${{ github.repository }}/wiki"
          fi

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wiki-content-${{ github.run_number }}
          path: |
            docs-md/
            diagrams/
            wiki/
          retention-days: 7

      - name: Summary
        run: |
          echo "## 📋 Wiki Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Method**: Official DeepWiki MCP + Puppeteer" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: VforVitorio/F1_Strat_Manager" >> $GITHUB_STEP_SUMMARY

          if [ -f "docs-md/metadata.json" ]; then
            PAGES=$(cat docs-md/metadata.json | grep -o '"totalPages": [0-9]*' | cut -d ':' -f2 | tr -d ' ')
            echo "- **Pages Extracted**: $PAGES" >> $GITHUB_STEP_SUMMARY
          fi

          WIKI_FILES=$(find wiki -name "*.md" | wc -l)
          echo "- **Wiki Pages**: $WIKI_FILES" >> $GITHUB_STEP_SUMMARY

          if [ -d "diagrams" ]; then
            DIAGRAMS=$(find diagrams -name "*.png" | wc -l)
            echo "- **Diagrams Captured**: $DIAGRAMS" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Status**: Documentation successfully updated!" >> $GITHUB_STEP_SUMMARY
