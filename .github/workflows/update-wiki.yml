name: Update Wiki from DeepWiki (Official Server with Puppeteer)

on:
  push:
    branches:
      - main

jobs:
  update-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js for Puppeteer
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@latest

      - name: Install Puppeteer
        run: |
          echo "📦 Installing Puppeteer..."
          npm init -y
          npm install puppeteer
          echo "✅ Puppeteer installed"

      - name: Get Real Content with Puppeteer (JavaScript Execution)
        run: |
          mkdir -p docs-md

          echo "🚀 Extracting real content from DeepWiki using browser automation..."
          echo "📡 Target URL: https://deepwiki.com/VforVitorio/F1_Strat_Manager"          # Create Puppeteer script to extract content
          cat > extract-deepwiki-content.js << 'EOFPUPPETEER'
          const puppeteer = require('puppeteer');
          const fs = require('fs');

          (async () => {
            console.log('🔧 Launching browser for complete DeepWiki extraction...');
            
            const browser = await puppeteer.launch({
              headless: true,
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--disable-accelerated-2d-canvas',
                '--no-first-run',
                '--no-zygote',
                '--single-process',
                '--disable-gpu'
              ]
            });

            try {
              const page = await browser.newPage();
              await page.setViewport({ width: 1280, height: 720 });
              await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36');

              const baseUrl = 'https://deepwiki.com/VforVitorio/F1_Strat_Manager';
              console.log(`🌐 Starting complete extraction from: ${baseUrl}`);

              // Step 1: Load main page and discover all subpages
              console.log('📄 Loading main page to discover all sections...');
              await page.goto(baseUrl, { waitUntil: 'networkidle2', timeout: 60000 });

              await Promise.race([
                page.waitForFunction(() => {
                  const text = document.body ? document.body.textContent || document.body.innerText : '';
                  return !text.includes('Loading...') && text.length > 500;
                }, { timeout: 30000 }),
                page.waitForSelector('a[href*="/VforVitorio/F1_Strat_Manager/"]', { timeout: 30000 })
              ]);

              await new Promise(resolve => setTimeout(resolve, 3000));

              // Step 2: Discover all available pages
              console.log('🔍 Discovering all available pages...');
              const allPages = await page.evaluate((baseUrl) => {
                const links = Array.from(document.querySelectorAll('a[href*="/VforVitorio/F1_Strat_Manager/"]'));
                const pageSet = new Set();
                
                // Add main page
                pageSet.add({ url: baseUrl, name: 'main' });
                
                // Extract unique page paths
                links.forEach(link => {
                  const href = link.getAttribute('href');
                  if (href && href.includes('/VforVitorio/F1_Strat_Manager/')) {
                    const fullUrl = href.startsWith('http') ? href : `https://deepwiki.com${href}`;
                    const path = href.split('/VforVitorio/F1_Strat_Manager/')[1] || '';
                    if (path && !path.includes('#') && !path.includes('?') && path.length > 0) {
                      const pageName = path.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase();
                      pageSet.add({ url: fullUrl, name: pageName, path: path });
                    }
                  }
                });

                return Array.from(pageSet);
              }, baseUrl);

              console.log(`� Found ${allPages.length} pages to extract:`);
              allPages.forEach(page => console.log(`   - ${page.name}: ${page.url}`));

              // Step 3: Extract content from each page
              const allContent = {};
              let totalCharacters = 0;

              for (const pageInfo of allPages) {
                console.log(`📄 Extracting content from: ${pageInfo.name}`);
                
                try {
                  await page.goto(pageInfo.url, { waitUntil: 'networkidle2', timeout: 60000 });
                  
                  await Promise.race([
                    page.waitForFunction(() => {
                      const text = document.body ? document.body.textContent || document.body.innerText : '';
                      return !text.includes('Loading...') && text.length > 500;
                    }, { timeout: 30000 }),
                    page.waitForSelector('article, .content, main', { timeout: 30000 })
                  ]);

                  await new Promise(resolve => setTimeout(resolve, 2000));

                  const extractedData = await page.evaluate(() => {
                    const selectors = ['main', '.content', '.documentation', '.markdown-body', '[data-content]', 'article'];
                    let content = '';
                    let title = document.title || '';
                    
                    for (const selector of selectors) {
                      const element = document.querySelector(selector);
                      if (element && element.innerText && element.innerText.length > content.length) {
                        content = element.innerText;
                      }
                    }
                    
                    if (!content || content.length < 100) {
                      content = document.body ? document.body.innerText : '';
                    }
                    
                    content = content
                      .replace(/Loading\.\.\./g, '')
                      .replace(/^\s+|\s+$/g, '')
                      .replace(/\n{3,}/g, '\n\n');
                    
                    return { title, content, length: content.length };
                  });

                  allContent[pageInfo.name] = {
                    title: extractedData.title,
                    content: extractedData.content,
                    url: pageInfo.url,
                    length: extractedData.length
                  };

                  totalCharacters += extractedData.length;
                  console.log(`   ✅ Extracted ${extractedData.length} characters from ${pageInfo.name}`);
                  
                } catch (error) {
                  console.log(`   ⚠️ Failed to extract from ${pageInfo.name}: ${error.message}`);
                  allContent[pageInfo.name] = {
                    title: pageInfo.name,
                    content: `# ${pageInfo.name}\n\nContent extraction failed for this section.`,
                    url: pageInfo.url,
                    length: 0
                  };
                }
              }

              // Step 4: Combine all content into structured markdown
              console.log('📝 Combining all extracted content...');
              
              let combinedMarkdown = '# F1 Strategy Manager - Complete Documentation\n\n';
              combinedMarkdown += '> AI-Powered Formula 1 Race Strategy Analysis and Decision Support System\n\n';
              combinedMarkdown += '## Table of Contents\n\n';
              
              // Add table of contents
              Object.keys(allContent).forEach(pageName => {
                if (pageName !== 'main') {
                  const title = allContent[pageName].title.replace(' | DeepWiki', '').replace('VforVitorio/F1_Strat_Manager', '').trim();
                  combinedMarkdown += `- [${title}](#${pageName})\n`;
                }
              });
              
              combinedMarkdown += '\n---\n\n';
              
              // Add main content first
              if (allContent.main) {
                combinedMarkdown += allContent.main.content + '\n\n---\n\n';
              }
              
              // Add all other sections
              Object.entries(allContent).forEach(([pageName, pageData]) => {
                if (pageName !== 'main') {
                  const cleanTitle = pageData.title.replace(' | DeepWiki', '').replace('VforVitorio/F1_Strat_Manager', '').trim();
                  combinedMarkdown += `## ${cleanTitle} {#${pageName}}\n\n`;
                  combinedMarkdown += pageData.content + '\n\n---\n\n';
                }
              });

              // Save individual files
              Object.entries(allContent).forEach(([pageName, pageData]) => {
                const filename = `docs-md/${pageName}.md`;
                const content = `# ${pageData.title.replace(' | DeepWiki', '')}\n\n${pageData.content}`;
                fs.writeFileSync(filename, content);
              });

              // Save combined file
              fs.writeFileSync('docs-md/deepwiki-raw.md', combinedMarkdown);
              
              // Save extraction metadata
              const metadata = {
                extractedAt: new Date().toISOString(),
                totalPages: allPages.length,
                totalCharacters: totalCharacters,
                pagesExtracted: Object.keys(allContent).length,
                method: 'puppeteer-multi-page-extraction',
                pages: Object.keys(allContent)
              };
              
              fs.writeFileSync('docs-md/extraction-metadata.json', JSON.stringify(metadata, null, 2));

              console.log('✅ Complete extraction finished!');
              console.log(`📊 Final stats:`);
              console.log(`   - Total pages processed: ${allPages.length}`);
              console.log(`   - Total characters extracted: ${totalCharacters}`);
              console.log(`   - Individual files created: ${Object.keys(allContent).length}`);
              console.log('📁 Files created:');
              console.log('   - docs-md/deepwiki-raw.md (combined)');
              console.log('   - docs-md/extraction-metadata.json');
              Object.keys(allContent).forEach(name => console.log(`   - docs-md/${name}.md`));

            } catch (error) {
              console.error('❌ Error during extraction:', error.message);
              
              const fallbackContent = `# F1 Strategy Manager

              > Complete extraction failed. Please visit the repository directly.

              **Repository**: [VforVitorio/F1_Strat_Manager](https://github.com/VforVitorio/F1_Strat_Manager)  
              **DeepWiki**: [https://deepwiki.com/VforVitorio/F1_Strat_Manager](https://deepwiki.com/VforVitorio/F1_Strat_Manager)

              ## Status
              Multi-page content extraction encountered an issue.

              **Error**: ${error.message}
              `;

              fs.writeFileSync('docs-md/deepwiki-raw.md', fallbackContent);
              console.log('📝 Fallback content created');
            } finally {
              await browser.close();
              console.log('🔚 Browser closed');
            }
          })();
          EOFPUPPETEER

          # Execute the Puppeteer script
          echo "🚀 Running content extraction..."
          node extract-deepwiki-content.js

          # Verify extraction
          if [ -f "docs-md/deepwiki-raw.md" ]; then
            echo "✅ Content extraction completed"
            echo "📊 Extracted content stats:"
            wc -l docs-md/deepwiki-raw.md
            wc -c docs-md/deepwiki-raw.md
            
            echo "📄 First 10 lines of extracted content:"
            head -10 docs-md/deepwiki-raw.md
          else
            echo "❌ Content extraction failed"
            exit 1
          fi

      - name: Clean and Process Extracted Content
        run: |
          echo "🧹 Cleaning and formatting extracted content..."

          # Process the extracted content with Python
          python3 << 'EOFPYTHON'
          import re
          import os

          def clean_deepwiki_content(content):
              """Clean and format DeepWiki content for GitHub Wiki"""
              
              # Remove common DeepWiki UI elements and artifacts
              content = re.sub(r'.*?DeepWiki.*?\n', '', content, flags=re.IGNORECASE)
              content = re.sub(r'.*?Powered by.*?\n', '', content, flags=re.IGNORECASE)
              content = re.sub(r'.*?Share.*?\n', '', content, flags=re.IGNORECASE)
              content = re.sub(r'.*?Last indexed:.*?\n', '', content, flags=re.IGNORECASE)
              content = re.sub(r'.*?Try DeepWiki.*?\n', '', content, flags=re.IGNORECASE)
              content = re.sub(r'.*?Which repo would you like to understand.*?\n', '', content, flags=re.IGNORECASE)
              
              # Remove navigation elements
              content = re.sub(r'- Overview\n- System Architecture.*?- Getting Started\n', '', content, flags=re.DOTALL)
              content = re.sub(r'Menu\n', '', content)
              content = re.sub(r'### On this page.*?- Getting Started\n', '', content, flags=re.DOTALL)
              
              # Remove source file references
              content = re.sub(r'Relevant source files.*?\n\n', '', content, flags=re.DOTALL)
              content = re.sub(r'Sources:.*?\n', '', content, flags=re.MULTILINE)
              
              # Clean up multiple consecutive newlines
              content = re.sub(r'\n{3,}', '\n\n', content)
              
              # Remove empty sections
              content = re.sub(r'\n## \n', '', content)
              content = re.sub(r'\n### \n', '', content)
              
              # Fix malformed headers
              content = re.sub(r'^([#]+)\s*$', '', content, flags=re.MULTILINE)
              
              # Clean up beginning of content
              content = content.strip()
              
              return content

          # Read the raw extracted content
          try:
              with open('docs-md/deepwiki-raw.md', 'r', encoding='utf-8') as f:
                  raw_content = f.read()
              
              print(f"📄 Original content length: {len(raw_content)} characters")
              
              # Clean the content
              cleaned_content = clean_deepwiki_content(raw_content)
              
              # Ensure we have a proper title
              if not cleaned_content.startswith('# '):
                  cleaned_content = '# F1 Strategy Manager\n\n' + cleaned_content
              
              # Save cleaned content
              with open('docs-md/cleaned-content.md', 'w', encoding='utf-8') as f:
                  f.write(cleaned_content)
              
              print(f"✅ Cleaned content length: {len(cleaned_content)} characters")
              print("🧹 Content cleaned and saved to docs-md/cleaned-content.md")
              
          except Exception as e:
              print(f"❌ Error processing content: {e}")
              # Create minimal fallback
              fallback = """# F1 Strategy Manager

          This repository contains an AI-powered Formula 1 race strategy analysis system.

          Please visit the [GitHub repository](https://github.com/VforVitorio/F1_Strat_Manager) for more details.
          """
              
              with open('docs-md/cleaned-content.md', 'w', encoding='utf-8') as f:
                  f.write(fallback)
              
              print("📝 Created fallback content")
          EOFPYTHON

          echo "✅ Content processing completed"

      - name: Checkout Wiki Repository
        uses: actions/checkout@v3
        with:
          repository: ${{ github.repository }}.wiki
          token: ${{ secrets.WIKI_PAT }}
          path: wiki

      - name: Generate Multiple Wiki Pages
        run: |
          echo "📝 Generating multiple organized wiki pages..."

          # Create organized wiki structure using Python
          python3 << 'EOFWIKIGEN'
          import os
          import re

          def clean_content_advanced(content):
              """Advanced cleaning for better markdown format"""
              # Remove DeepWiki navigation clutter
              content = re.sub(r'VforVitorio/F1_Strat_Manager.*?Devin Overview System Architecture.*?Developer Guide\s*', '', content, flags=re.DOTALL)
              
              # Fix malformed headers
              content = re.sub(r'^([^#\n]*)\s*\|\s*\{#[^}]+\}', r'# \1', content, flags=re.MULTILINE)
              
              # Remove repeated navigation blocks
              content = re.sub(r'Devin Overview System Architecture.*?Developer Guide', '', content, flags=re.DOTALL)
              
              # Clean up multiple consecutive newlines
              content = re.sub(r'\n{3,}', '\n\n', content)
              
              # Remove footer clutter
              content = re.sub(r'This wiki is featured.*?Deep Research.*?$', '', content, flags=re.DOTALL)
              
              # Clean up the beginning
              lines = content.split('\n')
              cleaned_lines = []
              skip_until_content = True
              
              for line in lines:
                  if skip_until_content:
                      # Look for actual content start
                      if line.strip() and not any(x in line.lower() for x in ['devin', 'overview', 'try deepwiki']):
                          skip_until_content = False
                          cleaned_lines.append(line)
                  else:
                      cleaned_lines.append(line)
              
              return '\n'.join(cleaned_lines).strip()

          # Define page organization
          wiki_pages = {
              'README.md': {
                  'title': '🏎️ F1 Strategy Manager',
                  'description': 'AI-Powered Formula 1 Race Strategy Analysis and Decision Support System',
                  'files': ['main.md', '1-overview.md']
              },
              'System-Architecture.md': {
                  'title': '🏗️ System Architecture & Setup',
                  'description': 'Technical architecture, installation and setup procedures',
                  'files': ['1-1-system-architecture.md', '1-2-installation-and-setup.md', '1-3-documentation-workflow.md']
              },
              'Streamlit-Dashboard.md': {
                  'title': '📊 Streamlit Dashboard',
                  'description': 'Interactive web interface for F1 strategy analysis',
                  'files': ['2-streamlit-dashboard.md', '2-1-strategy-recommendations-view.md', '2-2-gap-analysis-view.md', '2-3-radio-analysis-view.md', '2-4-time-predictions-view.md', '2-5-strategy-chat-interface.md']
              },
              'Machine-Learning-Models.md': {
                  'title': '🤖 Machine Learning Models',
                  'description': 'AI models for lap time prediction, tire degradation, and gap calculation',
                  'files': ['3-machine-learning-models.md', '3-1-lap-time-prediction.md', '3-2-tire-degradation-modeling.md', '3-3-vision-based-gap-calculation.md']
              },
              'NLP-Pipeline.md': {
                  'title': '🗣️ Natural Language Processing',
                  'description': 'Radio transcription, sentiment analysis, and entity recognition',
                  'files': ['4-nlp-pipeline.md', '4-1-radio-transcription.md', '4-2-sentiment-and-intent-analysis.md', '4-3-named-entity-recognition.md', '4-4-integrated-nlp-pipeline.md']
              },
              'Expert-System.md': {
                  'title': '🧠 Expert System',
                  'description': 'Rule-based decision engine for race strategy recommendations',
                  'files': ['5-expert-system.md', '5-1-facts-and-data-transformation.md', '5-2-degradation-rules.md', '5-3-gap-analysis-rules.md', '5-4-radio-message-rules.md', '5-5-integrated-rule-engine.md']
              },
              'Developer-Guide.md': {
                  'title': '👨‍💻 Developer Guide',
                  'description': 'Development environment, utilities, and deployment instructions',
                  'files': ['6-developer-guide.md', '6-1-data-processing-utilities.md', '6-2-model-artifacts-and-deployment.md', '6-3-development-environment.md']
              }
          }

          # Generate each wiki page
          for page_name, page_info in wiki_pages.items():
              print(f"📄 Creating {page_name}...")
              
              page_content = f"# {page_info['title']}\n\n"
              page_content += f"{page_info['description']}\n\n"
              
              if page_name == 'README.md':
                  # Special handling for main README - add navigation
                  page_content += "## 📚 Documentation Pages\n\n"
                  for other_page, other_info in wiki_pages.items():
                      if other_page != 'README.md':
                          clean_name = other_page.replace('.md', '').replace('-', ' ')
                          page_content += f"- **[{other_info['title']}]({other_page.replace('.md', '')})**  \n  {other_info['description']}\n\n"
                  
                  page_content += "---\n\n"
              
              # Add content from individual files
              for file_name in page_info['files']:
                  file_path = f"docs-md/{file_name}"
                  if os.path.exists(file_path):
                      print(f"  📎 Adding content from {file_name}")
                      with open(file_path, 'r', encoding='utf-8') as f:
                          file_content = f.read()
                      
                      # Clean the content
                      cleaned_content = clean_content_advanced(file_content)
                      
                      if cleaned_content.strip():
                          # Remove the first # header if it exists (we'll add our own section header)
                          lines = cleaned_content.split('\n')
                          if lines[0].startswith('# '):
                              section_title = lines[0][2:].strip()
                              content_without_header = '\n'.join(lines[1:]).strip()
                              
                              page_content += f"## {section_title}\n\n"
                              page_content += content_without_header + "\n\n---\n\n"
                          else:
                              page_content += cleaned_content + "\n\n---\n\n"
                  else:
                      print(f"  ⚠️ File {file_name} not found")
              
              # Add footer
              if page_name == 'README.md':
                  page_content += "\n## 🔗 Links & Resources\n\n"
                  page_content += "- **[GitHub Repository](https://github.com/VforVitorio/F1_Strat_Manager)**\n"
                  page_content += "- **[DeepWiki Documentation](https://deepwiki.com/VforVitorio/F1_Strat_Manager)**\n\n"
              
              page_content += f"\n*📝 This documentation is automatically generated using browser automation.*  \n"
              page_content += f"*🕒 Last updated: $(date '+%Y-%m-%d %H:%M:%S UTC')*\n"
              
              # Write the page
              with open(f"wiki/{page_name}", 'w', encoding='utf-8') as f:
                  f.write(page_content)
              
              print(f"✅ Created {page_name} ({len(page_content)} characters)")

          print(f"\n🎉 Generated {len(wiki_pages)} wiki pages successfully!")
          EOFWIKIGEN

          echo "✅ Wiki pages generation completed"
          echo "📁 Generated wiki files:"
          ls -la wiki/

      - name: Commit & Push Wiki Changes
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          # Check if there are changes before committing
          if git diff --quiet --staged; then
            echo "ℹ️ No changes to commit - documentation is up to date"
          else
            echo "📝 Committing documentation updates..."
            git commit -m "🔄 Update Wiki with Real DeepWiki Content (Puppeteer) - $(date '+%Y-%m-%d %H:%M')"
            
            echo "🚀 Pushing changes to wiki..."
            if git push; then
              echo "✅ Wiki updated successfully!"
            else
              echo "❌ Failed to push wiki changes"
              echo "This might be due to:"
              echo "  1. Wiki is not enabled for this repository"
              echo "  2. Insufficient permissions"
              echo "  3. Repository access restrictions"
              echo ""
              echo "To fix:"
              echo "  1. Go to repository Settings > Features > Wiki and enable it"
              echo "  2. Create at least one wiki page manually to initialize"
              exit 1
            fi
          fi

      - name: Upload Documentation Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deepwiki-documentation-puppeteer-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            docs-md/
            wiki/README.md
            extract-deepwiki-content.js
          retention-days: 30

      - name: Workflow Summary
        if: always()
        run: |
          echo "## 📋 Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎯 Documentation Source" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: VforVitorio/F1_Strat_Manager" >> $GITHUB_STEP_SUMMARY
          echo "- **DeepWiki URL**: https://deepwiki.com/VforVitorio/F1_Strat_Manager" >> $GITHUB_STEP_SUMMARY
          echo "- **Extraction Method**: Puppeteer with JavaScript execution" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Generated Content" >> $GITHUB_STEP_SUMMARY

          if [ -f "wiki/README.md" ]; then
            LINES=$(wc -l < wiki/README.md)
            SIZE=$(wc -c < wiki/README.md)
            echo "- **Wiki README**: $LINES lines, $SIZE bytes" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "docs-md/cleaned-content.md" ]; then
            CONTENT_SIZE=$(wc -c < docs-md/cleaned-content.md)
            echo "- **Main Content**: $CONTENT_SIZE bytes" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "docs-md/extraction-metadata.json" ]; then
            echo "- **Extraction Metadata**: Available" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Status" >> $GITHUB_STEP_SUMMARY
          echo "Documentation successfully generated using Puppeteer browser automation!" >> $GITHUB_STEP_SUMMARY
