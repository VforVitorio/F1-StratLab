name: Update Wiki from DeepWiki (Official Server)

on:
  push:
    branches:
      - main

jobs:
  update-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get Repository Documentation from Official DeepWiki Server
        run: |
          mkdir -p docs-md

          # Repository information
          REPO_OWNER="VforVitorio"
          REPO_NAME="F1_Strat_Manager"
          GITHUB_REPO="$REPO_OWNER/$REPO_NAME"

          echo "🚀 Fetching documentation for repository: $GITHUB_REPO"
          echo "📡 Using official DeepWiki MCP server: https://mcp.deepwiki.com/"

          # Test connectivity to official server
          echo "Testing connectivity to official DeepWiki server..."
          if curl -s --head "https://mcp.deepwiki.com/http" | head -n 1 | grep -q "200\|405\|404"; then
            echo "✅ Official DeepWiki server is accessible"
          else
            echo "❌ Cannot reach official DeepWiki server"
            exit 1
          fi

      - name: List Available Topics
        run: |
          echo "📋 Getting list of available documentation topics..."
            # Create MCP request to list topics
          LIST_TOPICS_PAYLOAD=$(cat << 'EOF'
          {
            "jsonrpc": "2.0",
            "method": "tools/call",
            "params": {
              "name": "list_topics",
              "arguments": {
                "github_repo": "VforVitorio/F1_Strat_Manager"
              }
            },
            "id": 1
          }
          EOF
          )

          echo "📤 Sending list_topics request..."
          echo "$LIST_TOPICS_PAYLOAD" | jq .

          # Make request to official server
          HTTP_CODE=$(curl -X POST "https://mcp.deepwiki.com/http" \
            -H "Content-Type: application/json" \
            -d "$LIST_TOPICS_PAYLOAD" \
            -o docs-md/topics-response.json \
            -w "%{http_code}" \
            -s)

          echo "📥 Response HTTP status: $HTTP_CODE"          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Successfully retrieved topics list"
            echo "📄 Topics response:"
            cat docs-md/topics-response.json | jq . || cat docs-md/topics-response.json
          else
            echo "⚠️ List topics request failed with HTTP $HTTP_CODE"            echo "Response content:"
            cat docs-md/topics-response.json
            
            # Continue anyway, we'll try to get content directly
            echo "Continuing with direct content retrieval..."
          fi

      - name: Get Full Repository Content
        run: |
          echo "📖 Getting complete repository documentation content..."

          # PRIMERO: Verificar si el repo existe usando list_topics
          echo "🔍 Checking if repository exists in DeepWiki..."

          # Si list_topics falló anteriormente, significa que el repo no está indexado
          if [ ! -f "docs-md/topics-response.json" ] || ! grep -q '"result"' docs-md/topics-response.json 2>/dev/null; then
            echo "❌ Repository VforVitorio/F1_Strat_Manager not found in DeepWiki"
            echo "The repository might not be indexed yet. Please:"
            echo "1. Visit https://deepwiki.com/VforVitorio/F1_Strat_Manager"
            echo "2. Verify the repository exists and is accessible"
            echo "3. Wait for DeepWiki to index the repository"
            
            # Crear contenido fallback
            cat > docs-md/cleaned-content.md << 'EOFFALLBACK'
          # F1 Strategy Manager

          Repository not yet indexed in DeepWiki. Please visit the GitHub repository directly:
          https://github.com/VforVitorio/F1_Strat_Manager

          ## Status
          This repository is not currently available in the DeepWiki database. 
          The documentation will be updated once the repository is indexed.
          EOFFALLBACK
            
            echo "✅ Created fallback documentation"
            exit 0
          fi

          # SEGUNDO: Si topics existe, extraer un topic específico para get_content
          echo "📋 Extracting available topics..."

          # Extraer el primer topic disponible
          FIRST_TOPIC=$(jq -r '.result.content[0].text // "Complete project documentation"' docs-md/topics-response.json 2>/dev/null || echo "Complete project documentation")

          echo "📖 Using topic: $FIRST_TOPIC"

          # Crear request con topic específico
          GET_CONTENT_PAYLOAD=$(cat << EOFPAYLOAD
          {
            "jsonrpc": "2.0",
            "method": "tools/call",
            "params": {
              "name": "get_content",
              "arguments": {
                "github_repo": "VforVitorio/F1_Strat_Manager",
                "topic": "$FIRST_TOPIC"
              }
            },
            "id": 2
          }
          EOFPAYLOAD
          )

          echo "📤 Sending get_content request with topic..."
          echo "$GET_CONTENT_PAYLOAD" | jq .

          # Hacer la llamada con topic
          HTTP_CODE=$(curl -X POST "https://mcp.deepwiki.com/http" \
            -H "Content-Type: application/json" \
            -d "$GET_CONTENT_PAYLOAD" \
            -o docs-md/content-response.json \
            -w "%{http_code}" \
            -s)

          echo "📥 Content response HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Successfully retrieved content"
            
            # Extraer contenido
            if jq -e '.result.content[0].text' docs-md/content-response.json > /dev/null 2>&1; then
              jq -r '.result.content[0].text' docs-md/content-response.json > docs-md/raw-content.md
              echo "📄 Content retrieved successfully"
            else
              echo "⚠️ Could not extract content from response"
              echo "Response structure:"
              cat docs-md/content-response.json | jq .
              exit 1
            fi
          else
            echo "❌ Get content request failed with HTTP $HTTP_CODE"
            echo "Response content:"
            cat docs-md/content-response.json
            exit 1
          fi

          # Verify response structure
          if jq -e '.result' docs-md/content-response.json > /dev/null 2>&1; then
            echo "✅ Valid MCP response structure detected"
          else
            echo "❌ Invalid response structure"            echo "Response structure:"
            jq 'keys' docs-md/content-response.json || echo "Not valid JSON"
            exit 1
          fi

      - name: Extract and Process Documentation Content
        run: |
          echo "🔄 Processing documentation content from official DeepWiki server..."

          # Check if we have content from the previous step
          if [ -f "docs-md/raw-content.md" ] && [ -s "docs-md/raw-content.md" ]; then
            echo "✅ Using content from get_content request..."
            cp docs-md/raw-content.md docs-md/extracted-content.md
          elif [ -f "docs-md/cleaned-content.md" ] && [ -s "docs-md/cleaned-content.md" ]; then
            echo "✅ Using fallback content..."
            cp docs-md/cleaned-content.md docs-md/extracted-content.md
          else
            echo "❌ No content available from previous steps"
            exit 1
          fi

          # Verify extracted content
          if [ ! -f docs-md/extracted-content.md ] || [ ! -s docs-md/extracted-content.md ]; then
            echo "❌ No content was extracted or file is empty"
            exit 1
          fi

          echo "✅ Successfully extracted documentation content"
          echo "📊 Extracted content stats:"
          wc -l docs-md/extracted-content.md

          echo "📄 First 10 lines of extracted content:"
          head -10 docs-md/extracted-content.md

          # Clean up and format content for wiki
          python3 << 'EOF'
          import re

          # Read extracted content
          with open('docs-md/extracted-content.md', 'r', encoding='utf-8') as f:
              content = f.read()

          print("🧹 Cleaning and formatting content for GitHub Wiki...")

          # Remove DeepWiki UI elements and navigation
          content = re.sub(r'.*?DeepWiki.*?\n', '', content, flags=re.IGNORECASE)
          content = re.sub(r'.*?Powered by Devin.*?\n', '', content, flags=re.IGNORECASE)
          content = re.sub(r'.*?Share.*?\n', '', content, flags=re.IGNORECASE)
          content = re.sub(r'.*?Last indexed:.*?\n', '', content, flags=re.IGNORECASE)
          content = re.sub(r'.*?Auto-refresh.*?\n', '', content, flags=re.IGNORECASE)

          # Clean up headers and formatting
          content = re.sub(r'^#+ ?/\s*$', '', content, flags=re.MULTILINE)
          content = re.sub(r'^\s*Menu\s*$', '', content, flags=re.MULTILINE)
          content = re.sub(r'^- Overview\n- System Architecture.*?- Getting Started\n', '', content, flags=re.DOTALL)

          # Remove empty lines at start
          content = content.lstrip()

          # Ensure proper spacing
          content = re.sub(r'\n{3,}', '\n\n', content)

          # Save cleaned content
          with open('docs-md/cleaned-content.md', 'w', encoding='utf-8') as f:
              f.write(content)

          print(f"✅ Content cleaned and saved. Final size: {len(content)} characters")
          EOF

      - name: Ask DeepWiki AI for Repository Summary
        run: |
          echo "🤖 Getting AI-powered repository summary from DeepWiki..."

          # Create question request for repository overview
          ASK_QUESTION_PAYLOAD=$(cat << 'EOF'
          {
            "jsonrpc": "2.0",
            "method": "tools/call",
            "params": {
              "name": "ask_question",
              "arguments": {
                "github_repo": "VforVitorio/F1_Strat_Manager",
                "question": "Provide a comprehensive overview of this F1 Strategy Manager project, including its main components, features, and architecture. Focus on the key modules like machine learning models, computer vision, NLP pipeline, and expert system."
              }
            },
            "id": 3
          }
          EOF
          )

          echo "📤 Sending AI question request..."

          # Make request for AI summary
          HTTP_CODE=$(curl -X POST "https://mcp.deepwiki.com/http" \
            -H "Content-Type: application/json" \
            -d "$ASK_QUESTION_PAYLOAD" \
            -o docs-md/ai-summary-response.json \
            -w "%{http_code}" \
            -s)

          echo "📥 AI summary response HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Successfully retrieved AI summary"
            
            # Extract AI summary
            if jq -e '.result.content[0].text' docs-md/ai-summary-response.json > /dev/null 2>&1; then
              jq -r '.result.content[0].text' docs-md/ai-summary-response.json > docs-md/ai-summary.md
              echo "🤖 AI Summary:"
              head -20 docs-md/ai-summary.md
            else
              echo "⚠️ Could not extract AI summary from response"
            fi
          else
            echo "⚠️ AI summary request failed, continuing without it"
            touch docs-md/ai-summary.md
          fi

      - name: Checkout Wiki Repository
        uses: actions/checkout@v3
        with:
          repository: ${{ github.repository }}.wiki
          token: ${{ secrets.GITHUB_TOKEN }}
          path: wiki

      - name: Generate Comprehensive Wiki Documentation
        run: |
          echo "📝 Generating comprehensive wiki documentation..."

          # Prepare content files
          MAIN_CONTENT="docs-md/cleaned-content.md"
          AI_SUMMARY="docs-md/ai-summary.md"

          # Verify we have content
          if [ ! -f "$MAIN_CONTENT" ] || [ ! -s "$MAIN_CONTENT" ]; then
            echo "❌ No main content available"
            exit 1          fi

          # Generate the complete wiki README
          cat > wiki/README.md << 'EOFREADME'
          # 🏎️ F1 Strategy Manager - Complete Documentation

          > **AI-Powered Formula 1 Race Strategy Analysis and Decision Support System**

          ## 📚 Documentation Overview

          This documentation is automatically generated from the project's DeepWiki repository analysis using the official DeepWiki MCP server.

          ### 🚀 Quick Navigation
          - [Project Overview](#project-overview)
          - [System Architecture](#system-architecture)  
          - [Core Components](#core-components)
          - [Getting Started](#getting-started)
          - [API Reference](#api-reference)
          - [Developer Guide](#developer-guide)

          ---

          EOFREADME

          # Add AI summary if available
          if [ -f "$AI_SUMMARY" ] && [ -s "$AI_SUMMARY" ]; then
            echo "## 🤖 AI-Generated Project Summary" >> wiki/README.md
            echo "" >> wiki/README.md
            cat "$AI_SUMMARY" >> wiki/README.md
            echo "" >> wiki/README.md
            echo "---" >> wiki/README.md
            echo "" >> wiki/README.md
          fi

          # Add main documentation content
          echo "## 📖 Complete Documentation" >> wiki/README.md
          echo "" >> wiki/README.md
          cat "$MAIN_CONTENT" >> wiki/README.md
            # Add footer
          cat >> wiki/README.md << 'EOFFOOTER'

          ---

          ## 🔗 Links & Resources

          - **GitHub Repository**: [VforVitorio/F1_Strat_Manager](https://github.com/VforVitorio/F1_Strat_Manager)
          - **DeepWiki Documentation**: [deepwiki.com/VforVitorio/F1_Strat_Manager](https://deepwiki.com/VforVitorio/F1_Strat_Manager)
          - **Project Wiki**: [GitHub Wiki](https://github.com/VforVitorio/F1_Strat_Manager/wiki)

          ---

          *📝 This documentation is automatically generated and updated from the project's DeepWiki analysis using the official DeepWiki MCP server.*

          *🕒 Last updated: $(date '+%Y-%m-%d %H:%M:%S UTC')*
          EOFFOOTER

          echo "✅ Wiki documentation generated successfully"
          echo "📊 Final documentation stats:"
          wc -l wiki/README.md

          echo "📁 Generated files:"
          ls -la wiki/

      - name: Commit & Push Wiki Changes
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          # Check if there are changes before committing
          if git diff --quiet --staged; then
            echo "ℹ️ No changes to commit - documentation is up to date"
          else
            echo "📝 Committing documentation updates..."
            git commit -m "🔄 Update Wiki from Official DeepWiki Server - $(date '+%Y-%m-%d %H:%M')"
            
            echo "🚀 Pushing changes to wiki..."
            if git push; then
              echo "✅ Wiki updated successfully!"
            else
              echo "❌ Failed to push wiki changes"
              echo "This might be due to:"
              echo "  1. Wiki is not enabled for this repository"
              echo "  2. Insufficient permissions"
              echo "  3. Repository access restrictions"
              echo ""
              echo "To fix:"
              echo "  1. Go to repository Settings > Features > Wiki and enable it"
              echo "  2. Create at least one wiki page manually to initialize"
              exit 1
            fi
          fi

      - name: Upload Documentation Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deepwiki-documentation-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            docs-md/
            wiki/README.md
          retention-days: 30

      - name: Workflow Summary
        if: always()
        run: |
          echo "## 📋 Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎯 Documentation Source" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: VforVitorio/F1_Strat_Manager" >> $GITHUB_STEP_SUMMARY
          echo "- **DeepWiki URL**: https://deepwiki.com/VforVitorio/F1_Strat_Manager" >> $GITHUB_STEP_SUMMARY
          echo "- **MCP Server**: Official DeepWiki (https://mcp.deepwiki.com/)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Generated Content" >> $GITHUB_STEP_SUMMARY

          if [ -f "wiki/README.md" ]; then
            LINES=$(wc -l < wiki/README.md)
            SIZE=$(wc -c < wiki/README.md)
            echo "- **Wiki README**: $LINES lines, $SIZE bytes" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "docs-md/cleaned-content.md" ]; then
            CONTENT_SIZE=$(wc -c < docs-md/cleaned-content.md)
            echo "- **Main Content**: $CONTENT_SIZE bytes" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "docs-md/ai-summary.md" ]; then
            AI_SIZE=$(wc -c < docs-md/ai-summary.md)
            echo "- **AI Summary**: $AI_SIZE bytes" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Status" >> $GITHUB_STEP_SUMMARY
          echo "Documentation successfully generated using official DeepWiki MCP server!" >> $GITHUB_STEP_SUMMARY
